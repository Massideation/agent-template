name: agent-001 wake

# 4x/day cron: Luca wakes at 00:00, 06:00, 12:00, and 18:00 UTC. This matches
# the documented 4x/day cadence and stops the hourly hammering of the shared
# free OpenRouter pool that was causing 429 storms. Selective publishing in
# decide_next means most wakes are silent in the public diary; only wakes with
# something new to say produce a public log entry.
# GitHub Actions cron may drift by several minutes under load.
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent-001
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent-001
        run: pip install -e .

      - name: Run one wake
        env:
          OPERATOR_NAME: Miguel
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FEED_ISSUE_TOKEN: ${{ secrets.FEED_ISSUE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPERATOR_EMAIL: ${{ vars.OPERATOR_EMAIL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # Optional voice unlock. Absent variable / secret -> empty -> off.
          VOICE_ENABLED: ${{ vars.VOICE_ENABLED }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          # Optional TTS model override. Empty -> module default (Kokoro).
          HF_TTS_MODEL: ${{ vars.HF_TTS_MODEL }}
        run: python -m src.wake

      - name: Commit state changes back to agent-001
        run: |
          git config user.name 'agent-001'
          git config user.email 'agent-001@users.noreply.github.com'
          git add state memory ledger logs
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "wake: $(TZ='America/New_York' date +%F)"
            git push
          fi

      - name: Mirror today's public log and persona to agent-grows-up
        if: always()
        run: |
          TODAY=$(TZ='America/New_York' date +%F)
          PUBLIC_LOG="logs/public/${TODAY}.md"

          mkdir -p ~/.ssh
          echo "${{ secrets.FEED_DEPLOY_KEY }}" > ~/.ssh/feed_key
          chmod 600 ~/.ssh/feed_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/feed_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts"

          git clone git@github.com:Massideation/agent-grows-up.git /tmp/feed
          mkdir -p /tmp/feed/logs/public

          # Today's public log, if there is one. A rest wake produces no log,
          # but persona.json still mirrors below so the page stays fresh.
          if [ -f "$PUBLIC_LOG" ]; then
            cp "$PUBLIC_LOG" "/tmp/feed/logs/public/${TODAY}.md"
          else
            echo "No public log produced today (${TODAY}). Mirroring persona only."
          fi

          # persona.json drives the public profile page. Lives next to the logs.
          if [ -f logs/public/persona.json ]; then
            cp logs/public/persona.json /tmp/feed/logs/public/persona.json
          fi

          # Optional voice clips for today.
          if [ -d logs/public/audio ]; then
            mkdir -p /tmp/feed/logs/public/audio
            cp logs/public/audio/* /tmp/feed/logs/public/audio/ 2>/dev/null || true
          fi

          # Seed the persona page into a fresh diary repo (template forks only).
          # agent-grows-up already carries these, so the guards make it a no-op.
          if [ ! -f /tmp/feed/index.html ] && [ -f site/index.html ]; then
            cp site/index.html /tmp/feed/index.html
          fi
          if [ ! -f /tmp/feed/community.html ] && [ -f site/community.html ]; then
            cp site/community.html /tmp/feed/community.html
          fi

          cd /tmp/feed
          git config user.name 'agent-001'
          git config user.email 'agent-001@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed. Nothing to push."
          else
            git commit -m "wake: ${TODAY}"
            git push origin main
          fi

          rm -f ~/.ssh/feed_key
